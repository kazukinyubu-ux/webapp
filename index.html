<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Web Apps</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero">
        <p class="eyebrow">KAZUKI LAB</p>
        <h1>Web Apps</h1>
        <p class="lead">アプリ一覧ページ。</p>
      </section>

      <section class="app-list" aria-label="アプリ一覧">
        <a class="app-card" href="./photo-bingo/">
          <div class="app-card__icon">📷</div>
          <div class="app-card__body">
            <h2>写真ビンゴ</h2>
            <p>お題に沿って写真を撮る、写真ミッションビンゴ</p>
          </div>
          <div class="app-card__arrow">→</div>
        </a>
        <a class="app-card" href="./travel-board/">
          <div class="app-card__icon">✈</div>
          <div class="app-card__body">
            <h2>旅行ボード</h2>
            <p>簡易的な旅のしおり/p>
          </div>
          <div class="app-card__arrow">→</div>
        </a>
      </section>

      <footer class="footer">
        <p>新しいアプリを今後も追加していきます。</p>
      </footer>
    </main>
  </body>
</html>
