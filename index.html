<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Photo Bingo</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <div>
          <p class="eyebrow">Photo Bingo</p>
          <h1>写真ビンゴ</h1>
        </div>
        <div class="room-box">
          <span class="room-label">ROOM</span>
          <span id="roomId" class="room-id">main</span>
        </div>
      </header>

      <div id="bingoMessage" class="bingo-message" aria-live="polite"></div>

      <section class="board-wrap" aria-label="ビンゴ盤">
        <div id="board" class="board"></div>
      </section>

      <p id="syncStatus" class="sync-status" aria-live="polite">同期準備中…</p>
      
      <section class="panel">
        <div class="panel-row">
          <div>
            <p class="label">共有URL</p>
          </div>
          <button id="copyLinkBtn" class="secondary-button" type="button">URLをコピー</button>
        </div>
      </section>
    </main>

    <script src="firebase.js"></script>
    <script src="tasks.js"></script>
    <script type="module" src="app.js"></script>
  </body>
</html>
