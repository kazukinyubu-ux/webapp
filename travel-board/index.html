<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>旅のしおりボード</title>
    <meta name="description" content="旅のしおり風のボード" />
    <link rel="stylesheet" href="style.css" />
    <script type="module" src="app.js" defer></script>
  </head>
  <body>
    <main class="app">
      <header class="app__header">
        <h1 class="app__title">旅のしおりボード</h1>
        <p class="app__subtitle">PCは横、スマホは横向きで見る旅マップ</p>
      </header>

      <section class="rotate-message" aria-label="画面の向きの案内">
        <div class="rotate-message__card">
          <p>横向きでご覧ください</p>
        </div>
      </section>

      <section class="board-area" aria-label="旅のしおりボード">
        <div class="board-shell">
          <div id="board" class="board" aria-live="polite"></div>
        </div>
      </section>

      <footer class="app__footer">
        <p>ベーシック版のデザイン確認用</p>
      </footer>
    </main>
  </body>
</html>
